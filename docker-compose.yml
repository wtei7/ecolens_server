version: "3.9"
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecolens}
      POSTGRES_DB: ${POSTGRES_DB:-ecolens}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-ecolens}"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ecolens}:${POSTGRES_PASSWORD:-ecolens}@db:5432/${POSTGRES_DB:-ecolens}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./tests:/app/tests
      - ./storage:/app/storage
volumes:
  db_data: